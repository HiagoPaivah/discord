<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form>
                <h1>Login</h1>
                <div class="input-box"> 
                    <input type="text" name="username" placeholder="username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box"> 
                    <input type="password" name="password" placeholder="password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Esqueci minha senha</a>
                </div>
                <button type="submit" class="btn">Login</button>
                
                <p>Login com Google ou E-mail</p>
                <div class="social-icons">
                    <div id="g_id_onload"
                        data-client_id="184754666200-ufqilui7gja7t37dfstkibolthp31s1j.apps.googleusercontent.com"
                        data-callback="handleCredentialResponse">
                    </div>
                    <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                    
                    <a href="#" class="fa-solid fa-envelope"></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form>
                <h1>Cadastro</h1>
                <div class="input-box"> 
                    <input type="text" name="username" placeholder="username" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box"> 
                    <input type="email" name="email" placeholder="email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-box"> 
                    <input type="password" name="password" placeholder="password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit" class="btn">Cadastrar</button>
                
                <p>Cadastro com Google ou E-mail</p>
                <div class="social-icons">
                    <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                    
                    <a href="#" class="fa-solid fa-envelope"></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Bem vindo!</h1>
                <p>Não tem conta ainda?</p>
                <button class="btn register-btn">Cadastre-se</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Bem vindo de volta!</h1>
                <p>Já tem uma conta?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script src="../script/login.js"></script>
</body>
</html>
