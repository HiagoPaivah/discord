<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Santa Cruz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css"> 
    <style>
        body { background-color: #f9f9f9; min-height: 100vh; }
        .cart-container { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .cart-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 1.5rem; 
            background: #fff; 
            margin-bottom: 1rem; 
            border-radius: .5rem; 
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.05); 
        }
        .cart-item img { height: 80px; width: 80px; object-fit: contain; }
        .cart-info { flex: 1; margin-left: 2rem; }
        .cart-info h3 { font-size: 1.8rem; color: #333; margin-bottom: .5rem; }
        .cart-info span { font-size: 1.5rem; color: #e84393; font-weight: bold; }
        .cart-total { 
            text-align: right; 
            font-size: 2.5rem; 
            margin-top: 2rem; 
            border-top: .2rem solid #eee; 
            padding-top: 1.5rem; 
        }
        .btn-checkout { 
            background: #333; 
            color: #fff; 
            padding: 1rem 3rem; 
            font-size: 1.7rem; 
            border-radius: .5rem; 
            cursor: pointer; 
            display: inline-block; 
            margin-top: 1rem;
            border: none;
            transition: .3s;
        }
        .btn-checkout:hover { background: #e84393; }
        .empty-msg { font-size: 2rem; text-align: center; color: #666; margin-top: 5rem; }
    </style>
</head>
<body>

<header>
    <input type="checkbox" name="" id="toggler">
    <label for="toggler" class="fas fa-bars"></label>

    <img src="../img/logo.png" alt="Santa Cruz" style="height: 60px">
    
    <nav class="navbar">
        <a href="index.html">home</a>
        <a href="bebidas.html">bebidas</a>
        <a href="favoritos.html">favoritos</a>
        <a href="carrinho.html">carrinho</a>
    </nav>

    <div class="icons">
        <span id="user-greeting" style="font-size: 1.5rem; color: #c11111; margin-right: 10px;"></span>
        
        <a href="favoritos.html" class="fas fa-heart"></a>
        <a href="carrinho.html" class="fas fa-shopping-cart"></a>
        
        <a href="login.html" id="login-icon" class="fa-solid fa-user"></a>
        
        <a href="#" id="logout-btn" class="fas fa-sign-out-alt" style="display:none; color: #c11111; margin-left: 10px;"></a>
    </div>
</header>

<section class="cart-container">
    <h1 class="heading" style="font-size: 3rem; text-align: center; margin-bottom: 3rem;"> 
        <span>Meu Carrinho</span> 
    </h1>

    <div id="cart-list">
        <p class="empty-msg">Carregando seus produtos...</p>
    </div>

    <div class="cart-total" id="total-area" style="display:none;">
        Total: <span id="total-price">R$ 0,00</span> <br>
        <button class="btn-checkout">Finalizar Compra</button>
    </div>
</section>

<script>
// 1. Função para gerenciar o cabeçalho
function gerenciarHeader() {
    const nome = localStorage.getItem('userName');
    const greeting = document.getElementById('user-greeting');
    const loginIcon = document.getElementById('login-icon');
    const logoutBtn = document.getElementById('logout-btn');

    if (nome) {
        greeting.innerText = `Olá, ${nome.split(' ')[0]}`;
        greeting.style.fontFamily = "'Poppins', sans-serif";
        loginIcon.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
    } else {
        greeting.innerText = '';
        loginIcon.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
    }
}

// 2. Função para carregar o carrinho
async function carregarCarrinho() {
    const email = localStorage.getItem('userEmail');
    const list = document.getElementById('cart-list');
    const totalArea = document.getElementById('total-area');
    const totalPriceDisplay = document.getElementById('total-price');
    
    if (!email) {
        list.innerHTML = `
            <div class="empty-msg">
                <p>Você precisa estar logado para ver seu carrinho.</p>
                <a href="login.html" class="btn-checkout">Fazer Login</a>
            </div>`;
        return;
    }

    try {
        const response = await fetch('/.netlify/functions/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'get_cart', email: email })
        });

        if (!response.ok) throw new Error("Erro ao buscar dados do servidor.");

        const itens = await response.json();

        if (!itens || itens.length === 0) {
            list.innerHTML = '<p class="empty-msg">Seu carrinho está vazio 🛒</p>';
            totalArea.style.display = 'none';
            return;
        }

        list.innerHTML = '';
        let totalGeral = 0;

        itens.forEach(item => {
            const preco = parseFloat(item.price) || 0;
            const quantidade = parseInt(item.quantity) || 1;
            totalGeral += (preco * quantidade);

            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image_url}" alt="${item.product_name}">
                    <div class="cart-info">
                        <h3>${item.product_name}</h3>
                        <span>R$ ${preco.toFixed(2).replace('.', ',')} x ${quantidade}</span>
                    </div>
                    <i class="fas fa-trash" style="font-size: 2rem; cursor: pointer; color: #ff0000;" 
                       onclick="alert('Em breve: remover item')"></i>
                </div>`;
        });

        totalArea.style.display = 'block';
        totalPriceDisplay.innerText = `R$ ${totalGeral.toFixed(2).replace('.', ',')}`;

    } catch (error) {
        console.error(error);
        list.innerHTML = '<p style="color:red; text-align:center;">Erro ao carregar os dados do carrinho.</p>';
    }
}

// 3. Lógica do botão de Sair
document.getElementById('logout-btn').addEventListener('click', (e) => {
    e.preventDefault();
    if(confirm("Deseja realmente sair?")) {
        localStorage.clear();
        window.location.href = 'index.html';
    }
});

// Executa as funções ao carregar a página
window.onload = () => {
    gerenciarHeader();
    carregarCarrinho();
};
</script>

</body>
</html>
